spring.application.name=backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ai_code_grading?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:${MYSQL_USER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:}}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

mybatis-plus.mapper-locations=classpath*:mapper/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

app.jwt.secret=${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
app.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}
app.storage.root=${STORAGE_ROOT:${UPLOAD_DIR:${user.home}/ai-code-grading/uploads}}
app.upload-dir=${app.storage.root}
app.ai.deepseek-api-key=${DEEPSEEK_API_KEY:}
app.ai.deepseek-base-url=${DEEPSEEK_BASE_URL:https://ai-gateway.neusoft.edu.cn/v1/models}
app.ai.local-base-url=${LOCAL_AI_BASE_URL:}
app.ai.local-api-key=${LOCAL_AI_API_KEY:}
app.ai.local-model=${LOCAL_AI_MODEL:Qwen2.5-Coder-7B-Instruct}
app.ai.model=${AI_MODEL:DeepSeek/DeepSeek-R1}
app.ai.provider=${AI_PROVIDER:deepseek}
app.ai.deepseek-timeout-seconds=${DEEPSEEK_TIMEOUT_SECONDS:600}
app.ai.local-timeout-seconds=${LOCAL_AI_TIMEOUT_SECONDS:600}
app.ai.max-completion-tokens=${AI_MAX_COMPLETION_TOKENS:8192}
app.ai.deepseek-token-quota=${DEEPSEEK_TOKEN_QUOTA:12000000}
app.ai.enable-remote=${AI_ENABLE_REMOTE:true}
app.ai.queue-enabled=${AI_QUEUE_ENABLED:false}
app.ai.redis-queue=${AI_REDIS_QUEUE:ai:grading:tasks}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2s
