services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_code_grading}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root_pass}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/001_schema.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis_pass}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-redis_pass} ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ./backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ai_code_grading}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER:-root}
      DB_PASSWORD: ${MYSQL_PASSWORD:-root_pass}
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass}
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me}
      ID_CARD_ENCRYPTION_KEY: ${ID_CARD_ENCRYPTION_KEY:-change-me-id-card-secret-change-me}
      APP_ENV_FILE: /config/.env
      STORAGE_ROOT: /data/ai-grading
      AI_QUEUE_ENABLED: "true"
      AI_REDIS_QUEUE: ${AI_REDIS_QUEUE:-ai:grading:tasks}
      AI_ENABLE_REMOTE: ${AI_ENABLE_REMOTE:-false}
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://ai-gateway.neusoft.edu.cn/v1/models}
      LOCAL_AI_BASE_URL: ${LOCAL_AI_BASE_URL:-}
      LOCAL_AI_MODEL: ${LOCAL_AI_MODEL:-Qwen2.5-Coder-7B-Instruct}
      LOCAL_AI_API_KEY: ${LOCAL_AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-DeepSeek/DeepSeek-R1}
      AI_MAX_COMPLETION_TOKENS: ${AI_MAX_COMPLETION_TOKENS:-8192}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ${STORAGE_ROOT:-/data/ai-grading}:/data/ai-grading
      - ./.env:/config/.env

  model-service:
    build:
      context: ./model-service
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      WORKER_ENABLED: "true"
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-5}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      AI_REDIS_QUEUE: ${AI_REDIS_QUEUE:-ai:grading:tasks}
      BACKEND_CALLBACK_URL: http://backend:8080/internal/ai-callback
      AI_ENABLE_REMOTE: ${AI_ENABLE_REMOTE:-false}
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://ai-gateway.neusoft.edu.cn/v1/models}
      LOCAL_AI_BASE_URL: ${LOCAL_AI_BASE_URL:-}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-600}
      LOCAL_AI_TIMEOUT_SECONDS: ${LOCAL_AI_TIMEOUT_SECONDS:-600}
      LOCAL_AI_MODEL: ${LOCAL_AI_MODEL:-Qwen2.5-Coder-7B-Instruct}
      LOCAL_AI_API_KEY: ${LOCAL_AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-DeepSeek/DeepSeek-R1}
      AI_MAX_COMPLETION_TOKENS: ${AI_MAX_COMPLETION_TOKENS:-8192}
      AI_PROMPT_FULL_CODE_CHAR_LIMIT: ${AI_PROMPT_FULL_CODE_CHAR_LIMIT:-8000}
      AI_PROMPT_CORE_CODE_CHAR_LIMIT: ${AI_PROMPT_CORE_CODE_CHAR_LIMIT:-30000}
      AI_PROMPT_CORE_TARGET_CHARS: ${AI_PROMPT_CORE_TARGET_CHARS:-16000}
      AI_PROMPT_SUMMARY_MAX_LINES: ${AI_PROMPT_SUMMARY_MAX_LINES:-100}
    ports:
      - "${MODEL_SERVICE_PORT:-8000}:8000"

  local-inference:
    profiles: ["local-inference"]
    build:
      context: ./inference-service
    environment:
      LOCAL_INFERENCE_MODEL: ${LOCAL_INFERENCE_MODEL:-Qwen2.5-Coder-7B-Instruct}
      LOCAL_INFERENCE_MODEL_PATH: ${LOCAL_INFERENCE_MODEL_PATH:-Qwen2.5-Coder-7B-Instruct}
      LOCAL_INFERENCE_SERVED_MODEL_NAME: ${LOCAL_INFERENCE_SERVED_MODEL_NAME:-Qwen2.5-Coder-7B-Instruct}
      LOCAL_INFERENCE_BACKEND: ${LOCAL_INFERENCE_BACKEND:-transformers}
      LOCAL_INFERENCE_MAX_MODEL_LEN: ${LOCAL_INFERENCE_MAX_MODEL_LEN:-32768}
      LOCAL_INFERENCE_MAX_NEW_TOKENS: ${LOCAL_INFERENCE_MAX_NEW_TOKENS:-8192}
      LOCAL_INFERENCE_DEVICE_MAP: ${LOCAL_INFERENCE_DEVICE_MAP:-auto}
      LOCAL_INFERENCE_DTYPE: ${LOCAL_INFERENCE_DTYPE:-auto}
      INFERENCE_DRY_RUN: ${INFERENCE_DRY_RUN:-false}
    ports:
      - "${LOCAL_INFERENCE_PORT:-8002}:8002"
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  mysql-data:
  redis-data:
  uploads:
  hf-cache:
